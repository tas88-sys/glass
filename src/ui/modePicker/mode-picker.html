<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="content-security-policy" content="script-src 'self' 'unsafe-inline' 'unsafe-eval'" />
        <title>Glass Mode Picker</title>
        <style>
            html,
            body {
                margin: 0;
                padding: 0;
                overflow: hidden;
                background: transparent;
                width: 160px;
                height: 144px;
                border-radius: 10px;
            }

            body {
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                background: rgba(30, 30, 35, 0.82);
                border-radius: 10px;
                border: 1px solid rgba(255, 255, 255, 0.12);
            }
        </style>
    </head>
    <body>
        <mode-picker-view></mode-picker-view>

        <script type="module" src="../../../public/build/mode-picker.js"></script>
    </body>
</html>
