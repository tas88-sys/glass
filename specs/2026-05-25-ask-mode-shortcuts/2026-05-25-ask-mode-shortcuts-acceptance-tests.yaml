# ─── Data integrity checks ─────────────────────────────────────────────
data_integrity:
  description: "Token uniqueness, defensive coerce, sentinel correctness"
  checks:
  - id: DI-001
    name: valid-modes-coerce-defensive
    plan_ref: plan §6 P2.6 + P5.1 + spec §8.1
    description: "Set users.default.askMode='banana' in electron-store; fire Ask; logs MUST show coerce-to-default and use pickle_glass_analysis (NOT profilePrompts.interview)"
    method: manual
    steps:
      - "Quit app"
      - "Edit electron-store JSON: set users.default.askMode='banana'"
      - "Re-launch app"
      - "Click Ask, type 'test', press Enter"
      - "Read main-process logs"
    expect:
      logs_contain: "pickle_glass_analysis (or equivalent indicator that default profile was chosen)"
      logs_do_not_contain: "interview"
    on_failure:
      severity: BLOCKER
      rca_hints:
        - "If 'interview' profile fires, the user gets TOPICS: / QUESTIONS: output instead of analysis output."
        - "VALID_MODES.includes(rawMode) ? rawMode : 'default' is the canonical coerce per spec §7.3."

  - id: DI-002
    name: preferred-language-whitespace-trim
    plan_ref: plan §6 P5.2 + spec §8.2
    description: "Set preferredCodeLanguage='   ' (whitespace only); fire Code mode; sentinel __INFER_FROM_SCREENSHOT__ appears in the system prompt sent to the LLM"
    method: manual
    steps:
      - "Settings → set Preferred Coding Language to '   ' (3 spaces)"
      - "Switch Ask mode to Code"
      - "Fire Ask with a screenshot of a coding problem"
      - "Inspect outgoing prompt log"
    expect:
      prompt_contains: "__INFER_FROM_SCREENSHOT__"
    on_failure:
      severity: BLOCKER
      rca_hints:
        - "If whitespace is not trimmed, the user accidentally sends '   ' as the target language and the LLM tries to write code in three-space-language."
        - "spec §8.2 mandates .trim() before injection."

  - id: DI-003
    name: askmode-persistence-across-restart
    plan_ref: spec §11 T6 (Persistence)
    description: "Set askMode='debug', quit app, relaunch. askMode is still 'debug'."
    method: manual
    steps:
      - "Launch app fresh"
      - "Open mode picker, select Debug"
      - "Verify badge reads 'Ask · Debug'"
      - "Quit app fully"
      - "Relaunch"
      - "Verify badge still reads 'Ask · Debug' on cold start"
    expect:
      badge_text: "Ask · Debug"
    on_failure:
      severity: BLOCKER
      rca_hints:
        - "If badge resets to 'Ask', settingsService.saveSettings({askMode:'debug'}) was never persisted, OR the connectedCallback fetch is broken."

# ─── Error scans / fallback paths ──────────────────────────────────────
error_scans:
  description: "Defensive paths from spec §8 hardening — must not crash; must surface helpful errors"
  checks:
  - id: ES-001
    name: ipc-failure-on-mount
    plan_ref: spec §11 T14 + spec §8.3
    description: "Simulate IPC failure on MainHeader mount by replacing the getAskMode handler with `throw new Error('boom')`. Badge defaults to 'Ask'; no crash; no console error blocks the app."
    method: manual
    steps:
      - "Temporarily edit featureBridge.js mainHeader:getAskMode handler to throw an Error"
      - "Launch app"
      - "Observe MainHeader"
    expect:
      badge_text: "Ask"
      no_crash: true
    on_failure:
      severity: BLOCKER
      rca_hints:
        - "try/catch in connectedCallback must cover this — spec §8.3 mandates."

  - id: ES-002
    name: picker-dismiss-on-blur
    plan_ref: spec §11 T12 + spec §8.4
    description: "Open mode picker, click on another app (e.g. Finder). Picker hides."
    method: manual
    expect:
      picker_visible: false
    on_failure:
      severity: BLOCKER
      rca_hints:
        - "ModePickerView must register window.addEventListener('blur', ...) per P3.5."

  - id: ES-003
    name: empty-screenshot-fallback
    plan_ref: spec §11 T11 + plan §2 technical context (multimodal-retry path)
    description: "Trigger an empty screenshot capture (e.g. permission denied). All four modes still respond using only the typed text — existing fallback path at askService.js:303-338 handles it."
    method: manual
    steps:
      - "Revoke screen-recording permission temporarily (or simulate via testing hook)"
      - "Fire Ask in each of the four modes with typed text"
      - "Verify response in all four cases"
    expect:
      all_modes_respond: true
    on_failure:
      severity: WARN
      rca_hints:
        - "Multimodal-retry path inherits the same outer systemPrompt variable — spec §2 E8 verified."
        - "If only default mode survives, mode routing is leaking somehow into the retry path."

  - id: ES-004
    name: blocked-summary-shows-alert
    plan_ref: spec §11 T9 (REGRESSION GATE) + plan §6 P2.5 + P4.7
    description: "With askMode='code', click a Listen summary follow-up action. User sees alert with the spec's literal error string. NO LLM call is made (verify via network log)."
    method: manual
    steps:
      - "Start a Listen session, generate at least one summary action"
      - "Switch Ask mode to Code"
      - "Click any summary follow-up action"
    expect:
      alert_displayed: true
      alert_text_contains: "Listen-summary actions only work in Default Ask mode"
      no_outbound_llm_request: true
    on_failure:
      severity: BLOCKER
      regression_gate: true
      rca_hints:
        - "This is the E2 regression gate. The whole 'block + warn' decision (spec §4 #6) hinges on this test."

# ─── Manual smoke test suite (mirrors spec §11) ────────────────────────
manual_smoke_tests:
  description: |
    Verbatim mirror of spec §11 T1–T14 + T-15. Execution order from plan §10.
    Each test is gated; ANY failure blocks merge.

  execution_order:
    - id: T1
      name: backward-compat-gate
      description: "Fresh install with empty settings → Ask works identically to today (default mode)"
      method: manual
      severity: BLOCKER
      on_failure:
        rca_hints:
          - "If T1 fails, the whole feature has a backward-compat regression and must NOT merge."

    - id: T2
      name: code-mode-default-language
      description: "Pick Code, leave language empty → screenshot a Go problem → response uses Go (sentinel branch)"
      method: manual
      severity: BLOCKER

    - id: T3
      name: code-mode-language-change
      description: "Switch Preferred Coding Language to 'python' in Settings, re-fire → response uses Python"
      method: manual
      severity: BLOCKER

    - id: T4
      name: debug-mode-five-heading-structure
      description: "Pick Debug, screenshot a stack trace → response uses the 5-heading structure (### Issues / ### Specific Improvements / ### Optimizations / ### Explanation / ### Key Points)"
      method: manual
      severity: BLOCKER

    - id: T5
      name: system-design-routing-rule-a
      description: "Pick System Design, type 'design Twitter feed' → response has all 10 sections + ASCII diagram, all numbers populated"
      method: manual
      severity: BLOCKER

    - id: T5b
      name: system-design-routing-rule-b
      description: "After T5, type 'deep dive on db' → response shows ONLY the data-model section expanded 3× with 2 numerical examples; other 9 sections each show '(unchanged — see prior turn)'"
      method: manual
      severity: BLOCKER

    - id: T6
      name: persistence
      description: "Restart app → mode persists"
      method: manual
      severity: BLOCKER
      duplicate_of: "DI-003"

    - id: T7
      name: listen-summary-still-uses-analysis-profile
      description: "Start Listen session, run summary every 5 turns → summary still uses pickle_glass_analysis"
      method: manual
      severity: BLOCKER
      verify_by: "Reading the prompt log — verify pickle_glass_analysis fires"

    - id: T8
      name: listen-summary-followup-default-mode
      description: "askMode='default'; click summary follow-up → behaves as today, LLM call fires with analysis profile"
      method: manual
      severity: BLOCKER

    - id: T9
      name: listen-summary-followup-non-default-mode-REGRESSION
      description: "askMode='code'; click summary follow-up → alert appears, NO LLM call"
      method: manual
      severity: BLOCKER
      regression_gate: true
      duplicate_of: "ES-004"

    - id: T10
      name: corrupted-askmode-coerce
      description: "Edit electron-store askMode='banana' → fire Ask → falls back to default profile, no crash"
      method: manual
      severity: BLOCKER
      duplicate_of: "DI-001"

    - id: T11
      name: empty-screenshot-fallback
      description: "Trigger empty screenshot capture → all four modes respond using only typed text"
      method: manual
      severity: WARN
      duplicate_of: "ES-003"

    - id: T12
      name: picker-dismiss-on-blur
      description: "Open picker, click another app → picker hides"
      method: manual
      severity: BLOCKER
      duplicate_of: "ES-002"

    - id: T13
      name: picker-focus-tab-enter
      description: "Tab cycles focus through 4 buttons; Enter activates focused row"
      method: manual
      severity: BLOCKER

    - id: T14
      name: settings-ipc-failure-on-mount
      description: "Simulate IPC throw → badge defaults to 'Ask', no crash"
      method: manual
      severity: BLOCKER
      duplicate_of: "ES-001"

    - id: T-15
      name: header-width-visual-gate
      description: "askMode='system_design' → header on 1920×1080 display shows 'Ask · SysDes' badge + caret fully visible, no overflow, no layout crash"
      method: manual
      severity: BLOCKER
      added_by: "spec clarify session 2026-05-25"

# ─── Final gate ─────────────────────────────────────────────────────────
gate_summary:
  blocker_count_must_be: 0
  warn_count_acceptable_threshold: 2
  duplicate_handling: "Duplicate-of references collapse to a single PASS — running T9 covers ES-004 and vice versa."
  merge_gate:
    require_all_blocker_pass: true
    require_t1_pass: true
    require_t9_pass_REGRESSION: true
    require_t15_pass_VISUAL: true
