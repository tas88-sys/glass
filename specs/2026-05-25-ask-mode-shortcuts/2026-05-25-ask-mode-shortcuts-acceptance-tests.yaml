      grep -E "pickle_glass_debug\s*:" src/features/common/prompts/promptTemplates.js && \
      grep -E "pickle_glass_system_design\s*:" src/features/common/prompts/promptTemplates.js
    expect:
      exit_code: 0
    on_failure:
