structural_checks:
  description: |
    Automated grep / read-based checks that verify the touched files contain the
    edits described in plan §6 substeps. Runnable without booting the app.
  checks:
  - id: SC-001
    name: settings-defaults-present
    plan_ref: plan §6 P1.1 + spec §7.1
    description: "settingsService.js getDefaultSettings() returns object containing askMode:'default' and preferredCodeLanguage:'go'"
    command: |
      grep -E "askMode:\s*'default'" src/features/settings/settingsService.js && \
      grep -E "preferredCodeLanguage:\s*'go'" src/features/settings/settingsService.js
    expect:
      exit_code: 0
      matches_both: true
    on_failure:
      severity: BLOCKER
      rca_hints:
        - "Verify getDefaultSettings() return object includes both keys after `contentProtection: true`."
        - "Check that the edit landed inside getDefaultSettings() and not in a sibling function."
      related_files: ["src/features/settings/settingsService.js"]

  - id: SC-002
    name: prompt-profiles-added
    plan_ref: plan §6 P1.2 + spec §9.1–§9.3
    description: "promptTemplates.js exports 3 new profile keys: pickle_glass_code, pickle_glass_debug, pickle_glass_system_design"
    command: |
