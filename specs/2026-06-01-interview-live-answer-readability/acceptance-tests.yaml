      on_failure:
        severity: HIGH
        rca_hints:
          - "FR-014: binding ${a.text} as a Lit child AND overwriting the same node's innerHTML in renderAnswers corrupts Lit reconciliation under per-token streaming and freezes the answer mid-stream."
          - "render() must emit `<div class=\"answer-body\" data-answer-id=\"${a.id}\"></div>` (empty); renderAnswers() fills it from this.answers."
        related_files: ["src/ui/listen/summary/LiveAnswerView.js"]

    - id: SC-014
      name: streaming-resize-event-wired
      plan_ref: spec FR-016 (LiveAnswerView dispatches live-answer-updated; ListenView listens and resizes)
      description: "the resize-on-stream path is wired — LiveAnswerView dispatches `live-answer-updated` and ListenView binds a listener for it"
      command: |
        grep -E "live-answer-updated" src/ui/listen/summary/LiveAnswerView.js && \
        grep -E "live-answer-updated" src/ui/listen/ListenView.js
      expect:
        exit_code: 0
      on_failure:
        severity: MEDIUM
        rca_hints:
          - "FR-016: LiveAnswerView.updated() must dispatch `new CustomEvent('live-answer-updated', { bubbles: true, composed: true })` and ListenView must bind `@live-answer-updated` to its window-resize handler (mirrors stt-view's @stt-messages-updated)."
          - "Without this the listen window resizes only on a view-mode toggle, so a long streaming answer stays clipped by the overflow:hidden assistant container."
        related_files:
          - "src/ui/listen/summary/LiveAnswerView.js"
          - "src/ui/listen/ListenView.js"

