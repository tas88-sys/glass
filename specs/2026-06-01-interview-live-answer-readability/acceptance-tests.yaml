    # --- Improvement 3 — rendering-correctness fixes (FR-013–FR-016, commit 1d74c07) ---
    - id: SC-011
      name: markdown-asset-path-resolves
      plan_ref: spec FR-013 (libs load from ../assets/ relative to content.html — NOT ../../../assets/ which 404s)
      description: "LiveAnswerView loads the markdown libs from ../assets/ (correct, relative to content.html in src/ui/app/) and NO load call uses the old repo-root-resolving ../../../assets/ path (the old path may still appear in an explanatory comment — only load calls are checked)"
      command: |
        grep -nE "(tryLoad|loadScript)\(['\"]\.\./assets/" src/ui/listen/summary/LiveAnswerView.js && \
        test -z "$(grep -nE "(tryLoad|loadScript)\(['\"]\.\./\.\./\.\./assets/" src/ui/listen/summary/LiveAnswerView.js || true)"
      expect:
        exit_code: 0
      on_failure:
        severity: HIGH
        rca_hints:
          - "FR-013: content.html lives in src/ui/app/, so assets resolve at ../assets/. The old ../../../assets/ resolved to the repo root (glass/assets/), 404'd, and the throw aborted loadLibraries before isLibrariesLoaded was set — so marked never ran and the answer showed raw markdown."
          - "Each library load must be independent (best-effort try/catch) so one 404 does not abort the rest."
        related_files: ["src/ui/listen/summary/LiveAnswerView.js"]

    - id: SC-012
      name: marked-invoked-via-parse
      plan_ref: spec FR-015 (marked v4 UMD is a namespace object — call .parse(), not marked(text))
      description: "renderAnswers invokes marked via .parse() (a bare this.marked(text) call throws on the v4 namespace object)"
      command: |
        grep -E "marked\.parse" src/ui/listen/summary/LiveAnswerView.js
      expect:
        exit_code: 0
      on_failure:
        severity: HIGH
        rca_hints:
          - "FR-015: marked v4's UMD build exposes {parse, setOptions, …} — `this.marked(text)` throws. Use `this.marked.parse(text)` when present (fall back to a direct call for builds where marked itself is the function)."
        related_files: ["src/ui/listen/summary/LiveAnswerView.js"]

    - id: SC-013
      name: answer-body-has-no-lit-child-binding
      plan_ref: spec FR-014 (render() emits an EMPTY .answer-body — no ${a.text} child binding — so renderAnswers' innerHTML never fights Lit reconciliation)
      description: "the .answer-body div in render() carries NO ${a.text} child binding (the no-mid-stream-freeze fix); renderAnswers owns the children"
      command: |
        node -e "const s=require('fs').readFileSync('src/ui/listen/summary/LiveAnswerView.js','utf8'); const bad=s.split(String.fromCharCode(10)).some(l=>l.includes('answer-body')&&l.includes('a.text')); if(bad){console.error('answer-body still binds a.text as a Lit child (mid-stream freeze risk)');process.exit(1)} else console.log('ANSWER_BODY_EMPTY_CONTAINER')"
      expect:
