test_gates:
  description: |
    Automated node:test gates required green before merge. Runner is the Node
    built-in (`npm test` = node --test src/**/__tests__/**/*.test.js). The LLM
    provider is mocked/injected in every integration case — no live calls. Baseline
    is 65/65 green; target is 65 + ~6–9 new, with ZERO baseline regressions.
  gates:
    - id: TG-001
      name: extractquestion-unit-truth-table
      plan_ref: plan Phase 2 steps 1-2 + spec FR-006/FR-007/FR-012 + data-model.md §E3
      description: "Unit tests for the new pure helper extractQuestion pass (RED-first, then GREEN) — the full T1–T8 truth-table"
      command: |
        node --test src/features/listen/summary/__tests__/liveAnswer.test.js
      expect:
        exit_code: 0
      assertions:
        - "T1 extractQuestion('how does garbage collection actually work in Go?') === 'how does garbage collection actually work in Go?' (clean wh-question == whole sentence, unmangled)"
        - "T2 extractQuestion('Okay so, um, the thing I wanted to ask is — how would you design a rate limiter?') === 'how would you design a rate limiter?' (filler-wrapped → isolated span)"
        - "T3 extractQuestion('Walk me through your last project.') === 'Walk me through your last project.' (bare imperative cue → full-text fallback)"
        - "T4 extractQuestion('compare a process and a thread') is non-empty (cue, no '?' → cue clause or full text; never empty)"
        - "T5 extractQuestion(\"What's your name? And where are you based?\") === 'where are you based?' (multiple questions → LAST interrogative clause — PINNED, RD5)"
        - "T6 extractQuestion('') === '' and extractQuestion('   ') === '' (empty/whitespace guard)"
        - "T7 extractQuestion(null) === '' , extractQuestion(undefined) === '' , extractQuestion(42) === '' (non-string guard; never throws)"
        - "T8 extractQuestion('Yes — Go is statically typed.') === 'Yes — Go is statically typed.' (declarative, no signal → full-text fallback)"
      on_failure:
        severity: BLOCKER
        rca_hints:
          - "These MUST have failed FIRST (RED) before T-P2.1 implemented the helper — Constitution Principle I."
          - "Reuse the four existing signals (C2/FR-006); multi-question pick is the LAST signal-bearing clause (RD5); empty/non-string → '' (mirrors :59-61); total function (never throws)."
          - "Clause iteration mirrors :69-73: split(/[.!?;,\\n]+/), peel LEAD_STRIP_RE, then test CLAUSE_LEAD_RE/CONTENT_CUE_RE/EMBEDDED_Q_RE (prefer a clause ending in '?')."
        related_files:
          - "src/features/listen/summary/summaryService.js"
          - "src/features/listen/summary/__tests__/liveAnswer.test.js"

    - id: TG-002
      name: label-and-passive-integration
      plan_ref: plan Phase 2 step 5 + spec FR-003/FR-008/FR-010 (Acceptance Scenarios 1/3/6/7)
      description: "Integration non-regression against a mocked stream — emitted question value + PASSIVE-suppress + lane-independence under the amended message (LLM provider mocked, no live calls)"
      command: |
        node --test src/features/listen/summary/__tests__/liveAnswer.test.js
      expect:
        exit_code: 0
      assertions:
        - "FR-008 emitted-label: with the mocked stream, the live-answer-update payload's `question` field equals extractQuestion(text) for a filler-wrapped turn (e.g. 'how would you design a rate limiter?')"
        - "FR-003 PASSIVE-suppress (parent AS-3, describe at :559): under the AMENDED injected message, a PASSIVE-prefixed mocked stream still emits nothing and holds the last answer — the bullet instruction never overrides the EXACT-PASSIVE directive"
        - "FR-010 lane-independence (parent AS-7, describe at :611): summary-update still fires on its 5-turn cadence and the summary lane output is unchanged under the amended message"
      on_failure:
        severity: BLOCKER
        rca_hints:
          - "The LLM provider MUST be mocked/injected (reuse the existing SummaryService subclass seam, liveAnswer.test.js:45-63) — no live calls."
          - "If PASSIVE-suppress (:559) regressed: the amended message dropped/reworded 'reply EXACTLY: PASSIVE' — restore it verbatim (FR-003 / SC-006)."
          - "If lane-independence (:611) regressed: a shared-state leak — confirm only the user-message content + the :451 value changed (FR-005/FR-010)."
        related_files:
          - "src/features/listen/summary/summaryService.js"
          - "src/features/listen/summary/__tests__/liveAnswer.test.js"

    - id: TG-003
      name: full-suite-no-regression
      plan_ref: T-VERIFY-UNIT + quickstart.md baseline (65/65)
      description: "The full node:test suite is green — the new extractQuestion + integration cases pass and the pre-existing suite (baseline 65) does not regress"
      command: |
        npm test
      expect:
        exit_code: 0
      assertions:
        - "Baseline 65 tests still pass (geminiModelRotator, gemini, askService-sse, and all prior liveAnswer cases incl. isLikelyQuestion / parseAnswerOrPassive / shouldTriggerAnswer / the AS-3..AS-8 integration blocks)"
        - "Total = 65 + ~6–9 new/changed, all passing; 0 regressions"
      on_failure:
        severity: BLOCKER
        rca_hints:
          - "If a pre-existing test broke, the change leaked beyond the user-message content + the :451 value — re-check FR-005/FR-010 boundaries (only summaryService.js production code, value/wording only)."
          - "A Node 22 / Windows test-runner IPC artifact ('Unable to deserialize cloned data', file-level uncaughtException) is NOT a code regression — re-run to confirm; subtest assertions are authoritative."
        related_files:
          - "src/features/listen/summary/summaryService.js"
          - "src/features/listen/summary/__tests__/liveAnswer.test.js"

    - id: TG-004
      name: lint-changed-files
      plan_ref: T-FINAL lint check
      description: "ESLint passes (no errors) for the changed files"
      command: |
        npm run lint
      expect:
        exit_code: 0
      on_failure:
        severity: HIGH
        rca_hints:
          - "Resolve eslint errors in summaryService.js / liveAnswer.test.js."
          - "Per the parent spec's note, eslint may not be installed in this checkout (absent from node_modules) — if `npm run lint` cannot execute, mark SKIP-WITH-REASON (eslint not installed) rather than FAIL."
        related_files:
          - "src/features/listen/summary/summaryService.js"
          - "src/features/listen/summary/__tests__/liveAnswer.test.js"

manual_smoke_tests:
  description: |
    From quickstart.md "Manual smoke check". No automated Electron-renderer or
    live-audio harness exists in this repo, so the rendered <ul><li> bullets and the
    cleaner Q: label are MANUAL acceptance steps, gated by the automated tests above.
  tests:
    - id: MST-001
      name: streamed-answer-renders-bullets
      plan_ref: quickstart manual step 3 + spec AS-1
      description: "Start a Listen session; have the interviewer ask a multi-part technical question over SYSTEM audio (e.g. 'How does garbage collection work in Go, and when does it run?')."
      expected: |
        The streamed answer in <live-answer-view> renders as a short headline followed
        by a real bulleted <ul><li> list (marked turns the '- '/'* ' lines into list items),
        NOT one run-on paragraph with inline ' - ' separators.
      manual_only: true
      on_failure:
        severity: HIGH
        rca_hints:
          - "If still a run-on paragraph: the injected user message (summaryService.js:256-259) is not reinforcing markdown bullets, or it asks for inline separators instead of newline-led '- '/'* ' lines (FR-001/SC-007)."
          - "Confirm promptTemplates.js was NOT edited (FR-002/NA-001) — the fix is the injected message only."

    - id: MST-002
      name: trivial-answer-not-padded
      plan_ref: quickstart + spec AS-2 / Edge Cases
      description: "Ask a question with a single, simple answer ('Is Go statically typed?')."
      expected: |
        The answer leads with the short headline and does NOT invent filler bullets to
        pad a trivial response (bullets appear only when there are real supporting points).
      manual_only: true
      on_failure:
        severity: MEDIUM
        rca_hints:
          - "If the model fabricates bullets for a one-liner: re-phrase the injected instruction as 'headline, then bullets WHEN there are supporting points' (FR-001/AS-2) — do not force bullets."

    - id: MST-003
      name: question-label-shows-only-the-question
      plan_ref: quickstart manual steps 4-5 + spec AS-3
      description: "Ask a filler-wrapped question over system audio ('Okay so, um, the thing I wanted to ask is — how would you design a rate limiter?')."
      expected: |
        The small Q: label above the answer in the history shows only
        'how would you design a rate limiter?', NOT the full filler-laden turn.
      manual_only: true
      on_failure:
        severity: HIGH
        rca_hints:
          - "If the label still shows the whole turn: confirm :451 passes extractQuestion(text) (SC-004) and the helper isolates the span for this input (TG-001 T2)."

    - id: MST-004
      name: passive-holds-last-answer
      plan_ref: quickstart manual step 6 + spec AS-7 (parent AS-3)
      description: "After an answer renders, say a non-question statement over system audio ('okay, let me pull up the next question')."
      expected: |
        The panel HOLDS the last answer (no flicker to empty, no new answer) — PASSIVE
        suppression still fires under the amended (always-on bullets) injected message.
      manual_only: true
      on_failure:
        severity: HIGH
        rca_hints:
          - "If it blanks or answers: the amended message broke the EXACT-PASSIVE directive (FR-003/SC-006) — restore 'reply EXACTLY: PASSIVE' verbatim. Also confirm TG-002 (:559) is green."

    - id: MST-005
      name: answer-renders-markdown-not-raw-syntax
      plan_ref: quickstart + spec AS-8 / FR-013/FR-015 (commit 1d74c07)
      description: "During MST-001, watch the answer body as it renders (this is the bug 1d74c07 fixed)."
      expected: |
        The answer shows RENDERED markdown — a bold headline and real <ul><li> bullets — NOT
        the raw characters '**' and '- ' as literal text. (If raw syntax shows, the markdown
        libs did not load — check the ../assets/ path, SC-011, and marked.parse, SC-012.)
      manual_only: true
      on_failure:
        severity: HIGH
        rca_hints:
          - "Raw '**'/'- ' on screen = marked never ran. Root causes fixed in 1d74c07: asset path was ../../../assets/ (404 → loader aborted before isLibrariesLoaded), and marked v4 namespace was called as a function (threw). Verify SC-011 + SC-012."

    - id: MST-006
      name: streaming-answer-does-not-freeze-or-clip
      plan_ref: quickstart + spec AS-9/AS-10 / FR-014/FR-016 (commit 1d74c07)
      description: "Ask a question whose answer is long enough to stream over several seconds and exceed one window height."
      expected: |
        The answer keeps updating token-by-token to completion (does NOT freeze partway), and
        the listen window grows to keep the whole answer visible (it is NOT clipped until you
        toggle transcript↔insights). On toggling away and back, the answer is still there.
      manual_only: true
      on_failure:
        severity: HIGH
        rca_hints:
          - "Freeze mid-stream = the .answer-body still binds ${a.text} as a Lit child while renderAnswers overwrites innerHTML (Lit reconciliation conflict). render() must emit an EMPTY .answer-body (SC-013)."
          - "Clipped until toggle = the live-answer-updated → ListenView resize path is not wired (SC-014, FR-016)."

    - id: MST-SAFETY-001
      name: answer-and-label-excluded-from-shared-screen
      plan_ref: quickstart manual step 7 + spec Enforcement Strategy (inherited)
      description: "Screen-share during MST-001/MST-003 and observe the SHARED screen (load-bearing, inherited invariant)."
      expected: |
        Neither the bulleted answer nor the cleaner Q: label appears on the shared screen —
        both render only in the content-protected listen window. (Automated guards: NA-004
        setContentProtection untouched + windowManager.js out of the diff. The FR-013–FR-016
        renderer edits touch no window-creation/content-protection code.)
      manual_only: true
      on_failure:
        severity: BLOCKER
        rca_hints:
          - "If visible on the shared screen: content protection is disabled or a non-protected window rendered the panel. The renderer fixes (FR-013–FR-016) touch no window code — check NA-004 first."

