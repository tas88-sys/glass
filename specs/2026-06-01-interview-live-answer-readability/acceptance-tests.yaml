structural_checks:
  description: |
    Automated grep / node checks that verify the touched file (summaryService.js)
    contains the three edits described in plan Phase 2 + quickstart.md, and that the
    new pure helper is exported for node:test. Runnable without booting the app.
  checks:
    - id: SC-001
      name: extractquestion-exported
      plan_ref: spec FR-006/FR-007/FR-009 + data-model.md §E3
      description: "summaryService.js exports the new pure helper extractQuestion so the node:test file can import it"
      command: |
        node -e "const s=require('./src/features/listen/summary/summaryService'); if(typeof s.extractQuestion!=='function'){console.error('extractQuestion NOT exported');process.exit(1)} else console.log('EXTRACTQUESTION_EXPORTED')"
      expect:
        exit_code: 0
        stdout_contains: "EXTRACTQUESTION_EXPORTED"
      on_failure:
        severity: BLOCKER
        rca_hints:
          - "Append `module.exports.extractQuestion = extractQuestion;` after summaryService.js:798, alongside the existing pure-helper export block (FR-009)."
          - "It must be a PURE free function (no I/O, no timers, no `this`) defined near isLikelyQuestion (~:80), like its siblings."
        related_files: ["src/features/listen/summary/summaryService.js"]

    - id: SC-002
      name: extractquestion-is-total-and-pure
      plan_ref: spec FR-007 (total function; never throws, never null/undefined) + data-model.md §E3 truth-table
      description: "extractQuestion satisfies the load-bearing rows of the truth-table directly (T1 identity, T2 span isolation, T5 LAST clause, T6 empty, T7 non-string, T8 fallback) — a fast behavioral guard outside the test file"
      command: |
        node -e "const {extractQuestion:e}=require('./src/features/listen/summary/summaryService'); const A=require('node:assert/strict'); A.equal(e(''),''); A.equal(e('   '),''); A.equal(e(null),''); A.equal(e(undefined),''); A.equal(e(42),''); A.equal(e('how does garbage collection actually work in Go?'),'how does garbage collection actually work in Go?'); A.equal(e('Okay so, um, the thing I wanted to ask is — how would you design a rate limiter?'),'how would you design a rate limiter?'); A.equal(e(\"What's your name? And where are you based?\"),'where are you based?'); A.equal(e('Yes — Go is statically typed.'),'Yes — Go is statically typed.'); A.ok(e('Walk me through your last project.').length>0); console.log('EXTRACTQUESTION_TRUTH_TABLE_OK')"
      expect:
        exit_code: 0
        stdout_contains: "EXTRACTQUESTION_TRUTH_TABLE_OK"
      on_failure:
        severity: BLOCKER
        rca_hints:
          - "Truth-table (data-model.md §E3): T1 clean wh-question → identity; T2 filler-wrapped → isolated span; T5 multi-question → LAST interrogative clause ('where are you based?'); T6 empty/whitespace → ''; T7 non-string → ''; T8 declarative → full trimmed text."
          - "Guards must mirror isLikelyQuestion (:59-61): non-string → '', empty → ''. Never throw. Non-empty input always yields non-empty output."
          - "If T2/T5 fail: clause split is `split(/[.!?;,\\n]+/)`; peel LEAD_STRIP_RE; pick the LAST signal-bearing clause (prefer one ending in '?', else CLAUSE_LEAD_RE/CONTENT_CUE_RE/EMBEDDED_Q_RE)."
        related_files: ["src/features/listen/summary/summaryService.js"]

    - id: SC-003
      name: extractquestion-reuses-existing-signals
      plan_ref: spec FR-006/C2 (reuse the SAME four signals as isLikelyQuestion — no divergent heuristic)
      description: "extractQuestion does NOT introduce a new, divergent question-signal regex set — the four module-scope signal constants remain the single source of truth"
      command: |
        node -e "const src=require('fs').readFileSync('src/features/listen/summary/summaryService.js','utf8'); const m=(src.match(/const\s+[A-Z][A-Z0-9_]*_RE\b/g)||[]); const names=new Set(m.map(s=>s.replace(/^const\s+/,''))); const expected=['CLAUSE_LEAD_RE','LEAD_STRIP_RE','CONTENT_CUE_RE','EMBEDDED_Q_RE']; const extra=[...names].filter(n=>!expected.includes(n)); if(extra.length){console.error('NEW signal regex(es) introduced (possible divergent heuristic):',extra);process.exit(1)} else console.log('SIGNALS_REUSED_NO_DIVERGENCE')"
      expect:
        exit_code: 0
        stdout_contains: "SIGNALS_REUSED_NO_DIVERGENCE"
      on_failure:
        severity: HIGH
        rca_hints:
          - "C2/FR-006: extractQuestion MUST reuse CLAUSE_LEAD_RE/LEAD_STRIP_RE/CONTENT_CUE_RE/EMBEDDED_Q_RE — the label's notion of a question must equal the lane's gate (isLikelyQuestion)."
          - "If you added a new *_RE constant, fold it back into reuse of the four existing signals. (A local non-_RE-named helper regex for clause splitting that mirrors the existing split is acceptable, but do NOT add a new question-SIGNAL regex.)"
        related_files: ["src/features/listen/summary/summaryService.js"]

    - id: SC-004
      name: label-call-site-uses-extractquestion
      plan_ref: "spec FR-008/D3 (summaryService.js:451 — question: text -> question: extractQuestion(text))"
      description: "the single makeLiveAnswer call site passes the extracted span as the question label (not the raw turn)"
      command: |
        grep -nE "question:\s*extractQuestion\s*\(\s*text\s*\)" src/features/listen/summary/summaryService.js
      expect:
        exit_code: 0
      on_failure:
        severity: BLOCKER
        rca_hints:
          - "Change summaryService.js:451 from `{ id: answerId, question: text }` to `{ id: answerId, question: extractQuestion(text) }` (FR-008)."
          - "This is the ONLY wiring change — LiveAnswerView.js renders ${a.question} verbatim (CSS Q: prefix at :148-149); do NOT edit the renderer."
        related_files: ["src/features/listen/summary/summaryService.js"]

    - id: SC-005
      name: raw-question-text-no-longer-passed
      plan_ref: spec FR-008 (the raw turn is replaced by the extracted span at :451)
      description: "the bare `question: text` form is gone from summaryService.js (replaced by the extractQuestion wrapping)"
