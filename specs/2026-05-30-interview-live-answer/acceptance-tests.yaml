          - "If one appears in the diff, the additive design has leaked — revert and reach the seam additively (e.g. fold reset into resetConversationHistory rather than editing listenService.js)."
        related_files:
          - "src/ui/listen/summary/SummaryView.js"
          - "src/features/common/prompts/promptTemplates.js"
          - "src/features/ask/askService.js"
          - "src/bridge/featureBridge.js"
          - "src/features/listen/listenService.js"

