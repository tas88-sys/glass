structural_checks:
  description: |
    Automated grep / node checks that verify the touched files contain the edits
    described in plan Phase 2 + spec FRs. Runnable without booting the app.
  checks:
    - id: SC-001
      name: pure-helpers-exported
      plan_ref: spec FR-018/C6 + data-model.md Pure Helper Signatures
      description: "summaryService.js exports the four pure helpers so the node:test file can import them"
      command: |
        node -e "const s=require('./src/features/listen/summary/summaryService'); const need=['isLikelyQuestion','normalizePassive','parseAnswerOrPassive','shouldTriggerAnswer']; const missing=need.filter(k=>typeof s[k]!=='function'); if(missing.length){console.error('MISSING:',missing);process.exit(1)} else console.log('ALL_HELPERS_EXPORTED')"
      expect:
        exit_code: 0
        stdout_contains: "ALL_HELPERS_EXPORTED"
      on_failure:
        severity: BLOCKER
        rca_hints:
          - "All four helpers must be exported from summaryService.js (FR-018/C6): isLikelyQuestion, normalizePassive, parseAnswerOrPassive, shouldTriggerAnswer."
          - "They must be PURE (no I/O, timers, or `this`) so makeLiveAnswer stays a thin orchestrator."
          - "If the module exports a class instance, attach the helpers to module.exports alongside it (or export a sibling helpers object) so '../summaryService' resolves them."
        related_files: ["src/features/listen/summary/summaryService.js"]

    - id: SC-002
      name: createstreaminglllm-imported
      plan_ref: spec FR-008/C1 + plan Phase 0.7 (summaryService.js:3 currently imports only createLLM)
      description: "summaryService.js adds the createStreamingLLM import from the ai factory"
      command: |
        grep -nE "createStreamingLLM" src/features/listen/summary/summaryService.js
      expect:
        exit_code: 0
      on_failure:
        severity: BLOCKER
        rca_hints:
          - "summaryService.js:3 currently imports only createLLM. ADD createStreamingLLM: const { createLLM, createStreamingLLM } = require('../../common/ai/factory');"
          - "Without it, makeLiveAnswer cannot make the two-arg streaming call (FR-008)."
        related_files: ["src/features/listen/summary/summaryService.js"]

    - id: SC-003
      name: two-arg-streaming-call
      plan_ref: spec FR-008/C1 (factory.js:128 createStreamingLLM(provider, opts))
      description: "makeLiveAnswer calls the TWO-ARG createStreamingLLM(provider, {...}) — not the single-object createLLM({...}) design-sketch form"
      command: |
        grep -nE "createStreamingLLM\s*\(\s*[A-Za-z0-9_.]+\s*,\s*\{" src/features/listen/summary/summaryService.js
      expect:
        exit_code: 0
      on_failure:
        severity: BLOCKER
        rca_hints:
          - "LOCKED C1/FR-008: createStreamingLLM(modelInfo.provider, { apiKey, model, temperature:0.7, maxTokens:900, usePortkey: provider==='openai-glass', portkeyVirtualKey: provider==='openai-glass'?apiKey:undefined })."
          - "Do NOT use createLLM({...}) single-object form (the design doc's sketch is WRONG per C1)."
          - "First resolve: const modelInfo = await modelStateService.getCurrentModelInfo('llm'); throw if !modelInfo || !modelInfo.apiKey."
        related_files: ["src/features/listen/summary/summaryService.js"]

    - id: SC-004
      name: trigger-hung-off-conversation-hub
      plan_ref: spec FR-001 (summaryService.js:45 addConversationTurn → triggerAnalysisIfNeeded)
      description: "addConversationTurn calls triggerAnswerIfNeeded(speaker, text) beside the existing triggerAnalysisIfNeeded"
      command: |
        grep -nE "triggerAnswerIfNeeded\s*\(" src/features/listen/summary/summaryService.js
      expect:
        exit_code: 0
      on_failure:
        severity: BLOCKER
        rca_hints:
          - "Hang this.triggerAnswerIfNeeded(speaker, text) inside addConversationTurn, beside this.triggerAnalysisIfNeeded() (summaryService.js:45)."
          - "Do NOT alter the analysis trigger — additive sibling call only (FR-017)."
        related_files: ["src/features/listen/summary/summaryService.js"]

    - id: SC-005
      name: sse-sentinels-honored
      plan_ref: spec FR-009 (mirror askService._processStream without importing it)
      description: "makeLiveAnswer's stream loop honors [DONE], _reset (discard + hadFallback), _final_model, and delta.content"
      command: |
        grep -E "_reset" src/features/listen/summary/summaryService.js && \
        grep -E "_final_model" src/features/listen/summary/summaryService.js && \
        grep -E "\[DONE\]" src/features/listen/summary/summaryService.js && \
        grep -E "delta" src/features/listen/summary/summaryService.js
      expect:
        exit_code: 0
      on_failure:
        severity: BLOCKER
        rca_hints:
          - "Replicate the askService SSE loop LOCALLY (FR-017 forbids importing askService): on [DONE] finalize; on _reset discard accumulated answer + set hadFallback=true; on _final_model record model; on choices[0].delta.content append + emit."
          - "Extract the per-line parse into a pure testable function (mirror askService-sse.test.js processSseLines)."
        related_files: ["src/features/listen/summary/summaryService.js"]

    - id: SC-006
      name: passive-prefix-buffer-streaming-aware
      plan_ref: spec FR-010/C2 (streaming-aware PASSIVE before render)
      description: "makeLiveAnswer uses the streaming-aware prefix-buffer via parseAnswerOrPassive (NOT a whole-string content.trim()==='PASSIVE' check)"
      command: |
        grep -nE "parseAnswerOrPassive\s*\(" src/features/listen/summary/summaryService.js
      expect:
        exit_code: 0
      on_failure:
        severity: HIGH
        rca_hints:
          - "LOCKED C2/FR-010: buffer the stream prefix until first '\\n' or ~16 chars, then parseAnswerOrPassive(prefix). The whole-string content.trim()==='PASSIVE' design-sketch is insufficient for a stream."
          - "On passive → suppress (emit nothing, hold last answer). Else flush prefix then stream deltas."
        related_files: ["src/features/listen/summary/summaryService.js"]

    - id: SC-007
      name: reset-folded-into-resetconversationhistory
      plan_ref: spec FR-011/C4/D4 (fold resetLiveAnswer into resetConversationHistory; summaryService.js:52)
      description: "resetConversationHistory invokes resetLiveAnswer (so reset rides existing listenService calls with no listenService.js edit)"
      command: |
        node -e "const src=require('fs').readFileSync('src/features/listen/summary/summaryService.js','utf8'); const m=src.match(/resetConversationHistory\s*\([^)]*\)\s*\{([\s\S]*?)\n\s{4}\}/); if(m && /resetLiveAnswer\s*\(/.test(m[1])) {console.log('RESET_FOLDED')} else {console.error('resetLiveAnswer() NOT called inside resetConversationHistory()');process.exit(1)}"
      expect:
        exit_code: 0
        stdout_contains: "RESET_FOLDED"
      on_failure:
        severity: BLOCKER
        rca_hints:
          - "LOCKED C4/D4/FR-011: call this.resetLiveAnswer() from inside resetConversationHistory() (summaryService.js:52)."
          - "resetLiveAnswer must (a) clear answerDebounceTimer, (b) abort inFlightController, (c) clear lastAnsweredTail + inFlight."
          - "Do NOT edit listenService.js — it already calls resetConversationHistory at :146 (start) and :247 (close)."
        related_files: ["src/features/listen/summary/summaryService.js"]

    - id: SC-008
      name: debounce-callback-bails-on-empty-history
      plan_ref: spec FR-012 (listen window NOT destroyed on Stop → isDestroyed() can't guard a late timer)
      description: "The debounce callback bails when conversationHistory is empty (race guard for a late timer after Stop)"
      command: |
        grep -nE "conversationHistory\.length\s*===\s*0|conversationHistory\.length\s*<\s*1|!this\.conversationHistory\.length" src/features/listen/summary/summaryService.js
      expect:
        exit_code: 0
      on_failure:
        severity: HIGH
        rca_hints:
          - "FR-012: the listen window is NOT destroyed on Stop (listenService.js:72-78), so the isDestroyed() guard in sendToRenderer does NOT protect a late debounce timer."
          - "The debounce callback MUST additionally bail if conversationHistory is empty before calling makeLiveAnswer."
          - "Memory lesson (stt-session-not-active-is-stopstart-race): treat a deliberate Stop as deliberate — abort + clear, never re-fire."
        related_files: ["src/features/listen/summary/summaryService.js"]

    - id: SC-009
      name: preload-live-answer-listeners-new-channel
      plan_ref: spec FR-013 (preload.js:205 summaryView namespace)
      description: "preload.js adds onLiveAnswerUpdate + removeAllLiveAnswerUpdateListeners on the NEW live-answer-update channel"
      command: |
        grep -E "onLiveAnswerUpdate" src/preload.js && \
        grep -E "removeAllLiveAnswerUpdateListeners" src/preload.js && \
        grep -E "live-answer-update" src/preload.js
      expect:
        exit_code: 0
      on_failure:
        severity: BLOCKER
        rca_hints:
          - "Add to the EXISTING summaryView namespace (preload.js:205), beside the summary-update listeners:"
          - "  onLiveAnswerUpdate: (callback) => ipcRenderer.on('live-answer-update', callback),"
          - "  removeAllLiveAnswerUpdateListeners: () => ipcRenderer.removeAllListeners('live-answer-update')"
          - "NEW channel name is 'live-answer-update' — do NOT reuse 'summary-update'."
        related_files: ["src/preload.js"]

    - id: SC-010
      name: service-emits-on-new-channel
      plan_ref: spec FR-013 (service sends on live-answer-update)
      description: "summaryService emits the streamed answer on the live-answer-update channel via sendToRenderer"
      command: |
        grep -nE "sendToRenderer\s*\(\s*['\"]live-answer-update['\"]" src/features/listen/summary/summaryService.js
      expect:
        exit_code: 0
      on_failure:
        severity: BLOCKER
        rca_hints:
          - "makeLiveAnswer must emit via this.sendToRenderer('live-answer-update', { answer, ts }) — the existing listen-window-targeted, isDestroyed()-guarded sender (summaryService.js:29)."
          - "Payload is the full accumulated answer text each delta (mirrors askService's currentResponse broadcast)."
        related_files: ["src/features/listen/summary/summaryService.js"]

    - id: SC-011
      name: liveanswerview-exists-with-resetanswer
      plan_ref: spec FR-014/FR-015 (NEW LiveAnswerView Lit component)
      description: "LiveAnswerView.js exists, registers <live-answer-view>, loads marked/DOMPurify idempotently, and exposes resetAnswer()"
      command: |
        test -f src/ui/listen/summary/LiveAnswerView.js && \
        grep -E "customElements\.define\(\s*['\"]live-answer-view['\"]" src/ui/listen/summary/LiveAnswerView.js && \
        grep -E "if\s*\(\s*!window\.marked" src/ui/listen/summary/LiveAnswerView.js && \
        grep -E "DOMPurify" src/ui/listen/summary/LiveAnswerView.js && \
        grep -E "resetAnswer\s*\(" src/ui/listen/summary/LiveAnswerView.js
      expect:
