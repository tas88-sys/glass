        rca_hints:
          - "Create src/ui/listen/summary/LiveAnswerView.js; register customElements.define('live-answer-view', LiveAnswerView)."
          - "Idempotent loader guarded by if(!window.marked) (mirror SummaryView.js:293); read marked/hljs/DOMPurify into instance fields."
          - "DOMPurify.sanitize every rendered delta (mirror SummaryView.js:375-397); plain-text fallback when libs absent (SummaryView.js:359)."
          - "Expose resetAnswer(); do NOT subclass SummaryView (FR-017)."
