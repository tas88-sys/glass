    provider is mocked/injected in every integration case — no live calls.
  gates:
    - id: TG-001
      name: pure-helper-unit-tests
      plan_ref: plan Phase 2 steps 1-2 + spec FR-001/FR-002/FR-004/FR-010/FR-018
      description: "Unit tests for the four pure helpers pass (RED-first, then GREEN)"
      command: |
        node --test src/features/listen/summary/__tests__/liveAnswer.test.js
      expect:
        exit_code: 0
      assertions:
        - "isLikelyQuestion('Can you walk me through how a Go channel works?') === true (?-tail + opener)"
        - "isLikelyQuestion('tell me about your experience') === true (opener, no ?)"
        - "isLikelyQuestion('Okay, great, let me share my screen') === false"
        - "isLikelyQuestion('') === false and isLikelyQuestion('   ') === false"
        - "normalizePassive('PASSIVE.') === 'PASSIVE' and normalizePassive('**PASSIVE**') === 'PASSIVE'"
        - "normalizePassive('  passive\\n') === 'PASSIVE'"
        - "normalizePassive of the native phrase 'Not sure what you need help with right now' equals its normalized suppress form"
        - "parseAnswerOrPassive('PASSIVE') -> {passive:true, flush:''}"
        - "parseAnswerOrPassive('A Go channel is a') -> {passive:false, flush:'A Go channel is a'}"
        - "shouldTriggerAnswer('Me', q, null, false) === false (mic gate)"
        - "shouldTriggerAnswer('Them', q, null, false) === true"
        - "shouldTriggerAnswer('Them', q, normalize(q), false) === false (de-dup same tail)"
        - "shouldTriggerAnswer('Them', newTail, normalize(old), true) === true (new question while in-flight)"
      on_failure:
        severity: BLOCKER
        rca_hints:
          - "These MUST have failed FIRST (RED) before T-P2.1 implemented the helpers — Constitution Principle I."
          - "De-dup tail normalize = trim + collapse whitespace + lowercase; PASSIVE compare is uppercase (data-model.md normalization rule)."
        related_files:
          - "src/features/listen/summary/summaryService.js"
          - "src/features/listen/summary/__tests__/liveAnswer.test.js"

    - id: TG-002
      name: sse-line-parser-unit-test
      plan_ref: plan Phase 2 step 3 + spec FR-009/FR-017/FR-018
      description: "The extracted pure SSE-line parser handles [DONE]/_reset/_final_model/delta.content (mirror askService-sse.test.js; askService NOT imported)"
      command: |
        node --test src/features/listen/summary/__tests__/liveAnswer.test.js
      expect:
        exit_code: 0
      assertions:
        - "parse 'data: [DONE]' -> done sentinel"
        - "parse 'data: {\"_reset\":true}' -> reset sentinel (consumer discards + sets hadFallback)"
        - "parse 'data: {\"_final_model\":\"x\"}' -> finalModel 'x'"
        - "parse 'data: {\"choices\":[{\"delta\":{\"content\":\"hi\"}}]}' -> delta 'hi'"
        - "blank / non-data line -> ignored"
      on_failure:
        severity: BLOCKER
        rca_hints:
          - "Extract the per-line parse into a standalone pure function and test it directly (mirror askService-sse.test.js processSseLines)."
          - "Do NOT import askService (FR-017). Order: sentinels checked before the delta path."
        related_files:
          - "src/features/listen/summary/summaryService.js"
          - "src/features/listen/summary/__tests__/liveAnswer.test.js"

    - id: TG-003
      name: orchestrator-integration-tests
      plan_ref: plan Phase 2 steps 5,7 + spec FR-003/FR-004/FR-010/FR-011/FR-012/FR-017 (AS 3,4,5,6,7,8)
      description: "Integration tests against an injected/mocked stream + fake clock pass — LLM provider mocked, no live calls"
      command: |
        node --test src/features/listen/summary/__tests__/liveAnswer.test.js
      expect:
        exit_code: 0
      assertions:
        - "AS-4 debounce coalescing: 3 them: fragments < 800ms apart -> exactly ONE stream / one LLM-seam invocation"
        - "AS-6 de-dup: trailing same-normalized-tail fragment -> no second stream"
        - "AS-5 abort-replace: new question mid-stream -> stream A AbortController.abort() called, stream B starts; no blank between"
        - "AS-3 PASSIVE suppress: PASSIVE / **PASSIVE** / native-phrase prefix -> no emit, last answer held (no flicker to empty)"
        - "AS-8 mid-debounce close: resetConversationHistory() clears timer + aborts stream -> no emit, no throw"
        - "FR-012 late-timer race: debounce callback with empty conversationHistory -> bail, no emit"
        - "AS-7 lane independence: summary-update still fires on its 5-turn cadence while answers stream; SummaryView output unchanged"
      on_failure:
        severity: BLOCKER
        rca_hints:
          - "The LLM provider MUST be mocked/injected (synthetic SSE ReadableStream) BEFORE every integration test — no live calls."
          - "Use a fake/injectable clock for the 800ms debounce."
          - "AS-5/AS-3: assert the panel never emits an empty/blank update between answers (hold-last, Q1/G3)."
          - "AS-8/FR-012: the listen window is NOT destroyed on Stop — the empty-history bail is the guard."
        related_files:
          - "src/features/listen/summary/summaryService.js"
          - "src/features/listen/summary/__tests__/liveAnswer.test.js"

    - id: TG-004
      name: full-suite-no-regression
      plan_ref: T-VERIFY-UNIT
      description: "The full node:test suite is green — the new file passes and the pre-existing suite (geminiModelRotator, gemini, askService-sse) does not regress"
      command: |
        npm test
      expect:
        exit_code: 0
      on_failure:
        severity: BLOCKER
        rca_hints:
          - "If a pre-existing test broke, the additive change leaked into a shared module (likely summaryService or preload) — re-check FR-017 boundaries."
        related_files:
          - "src/features/listen/summary/summaryService.js"
          - "src/preload.js"

    - id: TG-005
      name: lint-changed-files
      plan_ref: T-VERIFY-LINT
      description: "ESLint passes (no errors) for the changed files"
      command: |
        npm run lint
      expect:
        exit_code: 0
      on_failure:
        severity: HIGH
        rca_hints:
          - "Resolve eslint errors in summaryService.js / preload.js / ListenView.js / LiveAnswerView.js / liveAnswer.test.js."
          - "Lit template files may not be fully covered by the config (best-effort, per the sibling spec's note) — focus on real errors."
        related_files:
          - "src/features/listen/summary/summaryService.js"
          - "src/ui/listen/summary/LiveAnswerView.js"
          - "src/ui/listen/ListenView.js"
          - "src/preload.js"

manual_smoke_tests:
  description: |
    From quickstart.md "Manual end-to-end verification" + "Safety verification".
    No automated Electron-renderer or live-audio harness exists in this repo, so
    these are MANUAL acceptance steps gated by the automated tests above.
  tests:
    - id: MST-001
      name: streamed-answer-appears
      plan_ref: quickstart steps 2-4 + spec AS-1
      description: "Configure an LLM model, start a Listen session (insights pane visible), speak a question over SYSTEM audio (Them channel)."
      expected: |
        Within ~1-2s of the question settling, the Live Answer panel (ABOVE Live Insights)
        streams a markdown answer. The candidate never types.
      manual_only: true
      on_failure:
        severity: BLOCKER
        rca_hints:
          - "No first token: confirm the 800ms debounce fired and makeLiveAnswer resolved a model (getCurrentModelInfo('llm'))."
          - "No render: confirm preload.summaryView.onLiveAnswerUpdate is wired and <live-answer-view> is mounted + visible (viewMode==='insights')."

    - id: MST-002
      name: passive-holds-last-answer
      plan_ref: quickstart step 5 + spec AS-3
      description: "After an answer renders, speak small talk over system audio ('okay, let me pull up the next question')."
      expected: |
        The panel HOLDS the previous answer (no flicker to empty, no new answer) — PASSIVE suppressed before render.
      manual_only: true
      on_failure:
        severity: HIGH
        rca_hints:
          - "If it blanks: the prefix-buffer suppress path is clearing content instead of holding last (violates Q1/G3)."

    - id: MST-003
      name: mic-never-triggers
      plan_ref: quickstart step 6 + spec AS-2
      description: "Speak into the MIC (Me channel)."
      expected: "NO answer is generated (speaker gate blocks Me)."
      manual_only: true

    - id: MST-004
      name: multi-segment-coalesces
      plan_ref: quickstart step 7 + spec AS-4
      description: "Ask a multi-segment question with pauses over system audio."
      expected: "A SINGLE coalesced answer (not one per fragment)."
      manual_only: true

    - id: MST-005
      name: stop-mid-answer-clean
      plan_ref: quickstart step 8 + spec AS-8
      description: "Press Stop mid-answer; then start a new session."
      expected: |
        No error; the stream stops; starting a new session clears the panel
        (resetConversationHistory -> resetLiveAnswer + LiveAnswerView.resetAnswer()).
      manual_only: true

    - id: MST-SAFETY-001
      name: answer-excluded-from-shared-screen
      plan_ref: quickstart "Safety verification" + spec Enforcement Strategy
      description: "Screen-share during MST-001 and observe the SHARED screen (load-bearing)."
      expected: |
        The streamed answer does NOT appear on the shared screen — it renders only in the
        content-protected listen window. (Automated guards: NA-004 setContentProtection,
        NA-005 no answer logging, SC-010 listen-window-targeted emit.)
      manual_only: true
      on_failure:
        severity: BLOCKER
        rca_hints:
          - "If the answer is visible on the shared screen: content protection is disabled or the answer rendered in a non-protected window. Check NA-004 + SC-010 first."

ipc_contract_validation:
  description: |
    Confirms the NEW live-answer-update channel is additive and the renderer
    plumbing forwards it without disturbing the existing summary-update envelope.
  channels:
    - channel: "live-answer-update"
      direction: "main -> renderer (push, listen window only)"
      args_shape: |
        { answer: string, ts: number }   // full accumulated answer text each delta
      validation: |
        Emitted ONLY via sendToRenderer (summaryService.js:29), which targets
        windowPool.get('listen') with an isDestroyed() guard. Consumed by
        LiveAnswerView via preload.summaryView.onLiveAnswerUpdate. The existing
        summary-update channel is untouched (NA-003).
      regression_check:
        id: IPC-001
        command: |
          grep -nE "live-answer-update" src/preload.js && \
          grep -nE "live-answer-update" src/features/listen/summary/summaryService.js
        expect:
          exit_code: 0
          note: "Both the preload listener and the service emit reference the new channel name verbatim."
        on_failure:
          severity: HIGH
          rca_hints:
            - "Channel name must match exactly on both sides: 'live-answer-update'."
            - "If preload forwards via a namespaced object, ensure onLiveAnswerUpdate is exposed on the summaryView namespace (FR-013)."
          related_files: ["src/preload.js", "src/features/listen/summary/summaryService.js"]

on_failure:
  SC-001:
    rca_hints: ["Export the four pure helpers from summaryService.js so node:test can import them (FR-018/C6)."]
    related_files: ["src/features/listen/summary/summaryService.js"]
  SC-003:
    rca_hints: ["Two-arg createStreamingLLM(provider, opts) — NOT createLLM({...}). Resolve modelInfo first and guard !apiKey (C1/FR-008)."]
    related_files: ["src/features/listen/summary/summaryService.js"]
  SC-007:
    rca_hints: ["Fold resetLiveAnswer() into resetConversationHistory(); never edit listenService.js (C4/D4/FR-011)."]
    related_files: ["src/features/listen/summary/summaryService.js"]
  NA-004:
    rca_hints: ["Never call setContentProtection(false); windowManager.js stays out of the diff (load-bearing safety)."]
    related_files: ["src/window/windowManager.js"]
  NA-005:
    rca_hints: ["Answer text must never be logged to a capturable sink — only trigger/suppress/error events may log."]
    related_files: ["src/features/listen/summary/summaryService.js", "src/ui/listen/summary/LiveAnswerView.js"]
