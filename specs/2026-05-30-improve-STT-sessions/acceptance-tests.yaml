    severity: critical
    manual_verification: true
    gated_phase: "p3"

  - id: "AT-NEG-004"
    requirement: "INV-1 / FR-3.3 — session pointers nulled in exactly TWO places (no third null site)"
    environments: [local]
    check_type: "manual_grep"
    command: "grep -cE \"this\\.(my|their)SttSession\\s*=\\s*null\" src/features/listen/stt/sttService.js"
    expected_result: "4"
    description: "mySttSession AND theirSttSession may each be set to null ONLY in the constructor (2 lines) and closeSessions() (2 lines) = 4 matches total. Reconnect must swap atomically (assign new, then close dead) — never a transient null (INV-1). A count > 4 means a new (forbidden) null-site was introduced. Manual review confirms the 4 are the constructor + closeSessions pair, not a reconnect path."
    severity: critical
    manual_verification: true

  - id: "AT-NEG-005"
    requirement: "D3 / EDGE_CASES E11 — macOS native loop guard not double-guarded or broken"
    environments: [local]
    check_type: "manual_grep"
